<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sakte film</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0a0a; color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  #app { position: relative; width: 100%; height: 100%; }

  video, #placeholder {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    background: #000;
  }
  #placeholder {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px;
    color: #666; text-align: center; padding: 20px;
  }

  #topBar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 14px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
  }
  #status {
    font-size: 13px; font-weight: 600;
    background: rgba(0,0,0,0.5);
    padding: 6px 12px; border-radius: 20px;
    display: flex; align-items: center; gap: 6px;
  }
  #status.recording { color: #ff4444; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ff4444; display: none;
  }
  #status.recording .dot { display: inline-block; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #fpsInfo {
    font-size: 12px; color: #999;
    background: rgba(0,0,0,0.5);
    padding: 6px 10px; border-radius: 20px;
  }

  #bottomBar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 24px 20px;
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    display: flex; justify-content: center; align-items: center; gap: 24px;
    z-index: 10;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  }

  .shutter {
    width: 76px; height: 76px; border-radius: 50%;
    border: 4px solid #fff; background: transparent;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .shutter-inner {
    width: 60px; height: 60px; border-radius: 50%;
    background: #ff3b30;
    transition: all 0.2s;
  }
  .shutter.recording .shutter-inner {
    width: 28px; height: 28px; border-radius: 8px;
  }

  .sidebtn {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none; color: #fff;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .sidebtn:disabled { opacity: 0.3; }

  #speedControls {
    position: absolute; bottom: 190px; left: 0; right: 0;
    display: none;
    justify-content: center; gap: 8px;
    padding: 0 20px;
    z-index: 10;
  }
  #speedControls.show { display: flex; }
  .speedBtn {
    padding: 8px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(0,0,0,0.5); color: #fff;
    font-size: 13px; font-weight: 600;
  }
  .speedBtn.active { background: #fff; color: #000; }

  #scrubWrap {
    position: absolute; bottom: 130px; left: 0; right: 0;
    display: none;
    flex-direction: column;
    gap: 8px;
    padding: 0 20px;
    z-index: 10;
  }
  #scrubWrap.show { display: flex; }
  #scrubBar {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.3);
    outline: none;
  }
  #scrubBar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
  }
  #timeInfo {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #ccc;
    font-variant-numeric: tabular-nums;
  }
  #frameControls {
    display: flex; justify-content: center; align-items: center;
    gap: 14px;
  }
  .frameBtn {
    padding: 8px 16px; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(0,0,0,0.5); color: #fff;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
  }
  .playPauseBtn {
    padding: 8px 16px; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.15); color: #fff;
    font-size: 13px; font-weight: 600;
  }

  #playbackLabel {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    padding-top: max(14px, env(safe-area-inset-top));
    font-size: 13px; color: #ccc;
    z-index: 10;
  }

  button { font-family: inherit; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div id="placeholder">
    <div style="font-size:40px;">🎬</div>
    <div id="placeholderText">Trykk på knappen for å starte kameraet</div>
    <button id="startCamBtn" style="margin-top:10px; padding:10px 20px; border-radius:20px; border:none; background:#fff; color:#000; font-weight:600;">Start kamera</button>
  </div>

  <video id="liveView" autoplay playsinline muted style="display:none;"></video>
  <video id="playback" playsinline style="display:none;"></video>

  <div id="topBar" style="display:none;">
    <div id="status"><span class="dot"></span><span id="statusText">Klar</span></div>
    <div id="fpsInfo"></div>
  </div>

  <div id="playbackLabel" style="display:none;">Avspilling i sakte film</div>

  <div id="speedControls">
    <button class="speedBtn" data-speed="1">1x</button>
    <button class="speedBtn" data-speed="0.5">0.5x</button>
    <button class="speedBtn active" data-speed="0.25">0.25x</button>
    <button class="speedBtn" data-speed="0.1">0.1x</button>
    <button class="speedBtn" data-speed="0.05">0.05x</button>
  </div>

  <div id="scrubWrap">
    <div id="frameControls">
      <button class="frameBtn" id="prevFrameBtn">⏮ frame</button>
      <button class="playPauseBtn" id="playPauseBtn">⏸</button>
      <button class="frameBtn" id="nextFrameBtn">frame ⏭</button>
    </div>
    <input type="range" id="scrubBar" min="0" max="1000" value="0" step="1">
    <div id="timeInfo">
      <span id="curTime">0:00.00</span>
      <span id="frameNum">bilde 0</span>
      <span id="durTime">0:00.00</span>
    </div>
  </div>

  <div id="bottomBar" style="display:none;">
    <button class="sidebtn" id="viewBtn" disabled title="Se video">▶️</button>
    <button class="shutter" id="shutterBtn"><div class="shutter-inner"></div></button>
    <button class="sidebtn" id="newBtn" disabled title="Ny video">🔄</button>
  </div>
</div>

<script>
const liveView = document.getElementById('liveView');
const playback = document.getElementById('playback');
const placeholder = document.getElementById('placeholder');
const topBar = document.getElementById('topBar');
const bottomBar = document.getElementById('bottomBar');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');
const fpsInfo = document.getElementById('fpsInfo');
const shutterBtn = document.getElementById('shutterBtn');
const viewBtn = document.getElementById('viewBtn');
const newBtn = document.getElementById('newBtn');
const speedControls = document.getElementById('speedControls');
const playbackLabel = document.getElementById('playbackLabel');
const startCamBtn = document.getElementById('startCamBtn');

let stream = null;
let recorder = null;
let chunks = [];
let recordedBlob = null;
let recordedUrl = null;
let isRecording = false;
let viewingPlayback = false;
let actualFps = 30; // brukes til frame-stepping, oppdateres når kamera starter

// Prøver høyest fps først, faller nedover til noe funker.
// De fleste iPhone-nettlesere vil ende på 30 eller 60 uansett — det er en
// OS-begrensning i Safari/WebKit, ikke noe som kan omgås med kode.
const FPS_ATTEMPTS = [240, 120, 60, 30];

async function startCamera() {
  document.getElementById('placeholderText').textContent = 'Ber om kameratilgang...';

  for (const targetFps of FPS_ATTEMPTS) {
    try {
      const constraints = {
        audio: false,
        video: {
          facingMode: { ideal: 'environment' },
          frameRate: { exact: targetFps },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      };
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      break; // funket, gå videre
    } catch (err) {
      stream = null; // prøv neste fps i lista
    }
  }

  // Siste fallback: ingen exact frameRate-krav i det hele tatt,
  // la nettleseren velge selv
  if (!stream) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      });
    } catch (err) {
      document.getElementById('placeholderText').textContent =
        'Fikk ikke tilgang til kamera: ' + err.message;
      return;
    }
  }

  liveView.srcObject = stream;
  liveView.style.display = 'block';
  placeholder.style.display = 'none';
  topBar.style.display = 'flex';
  bottomBar.style.display = 'flex';

  const track = stream.getVideoTracks()[0];
  const settings = track.getSettings();
  actualFps = settings.frameRate ? Math.round(settings.frameRate) : 30;
  fpsInfo.textContent = actualFps + ' fps';

  statusText.textContent = 'Klar til opptak';
}

startCamBtn.addEventListener('click', startCamera);

function pickMimeType() {
  const options = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
  for (const o of options) {
    if (MediaRecorder.isTypeSupported(o)) return o;
  }
  return '';
}

function startRecording() {
  if (!stream) return;
  chunks = [];
  const mimeType = pickMimeType();
  try {
    recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
  } catch (e) {
    recorder = new MediaRecorder(stream);
  }

  recorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    const type = recorder.mimeType || 'video/webm';
    recordedBlob = new Blob(chunks, { type });
    if (recordedUrl) URL.revokeObjectURL(recordedUrl);
    recordedUrl = URL.createObjectURL(recordedBlob);
    viewBtn.disabled = false;
    newBtn.disabled = false;
    statusText.textContent = 'Opptak lagret';
    statusEl.classList.remove('recording');
    shutterBtn.classList.remove('recording');
  };

  recorder.start();
  isRecording = true;
  statusText.textContent = 'Filmer...';
  statusEl.classList.add('recording');
  shutterBtn.classList.add('recording');
}

function stopRecording() {
  if (recorder && recorder.state !== 'inactive') {
    recorder.stop();
  }
  isRecording = false;
}

shutterBtn.addEventListener('click', () => {
  if (viewingPlayback) return; // ignorer mens man ser video
  if (!isRecording) {
    startRecording();
  } else {
    stopRecording();
  }
});

const scrubWrap = document.getElementById('scrubWrap');
const scrubBar = document.getElementById('scrubBar');
const curTimeEl = document.getElementById('curTime');
const durTimeEl = document.getElementById('durTime');
const frameNumEl = document.getElementById('frameNum');
const prevFrameBtn = document.getElementById('prevFrameBtn');
const nextFrameBtn = document.getElementById('nextFrameBtn');
const playPauseBtn = document.getElementById('playPauseBtn');

function fmtTime(t) {
  if (!isFinite(t)) return '0:00.00';
  const m = Math.floor(t / 60);
  const s = (t % 60).toFixed(2).padStart(5, '0');
  return `${m}:${s}`;
}

function frameTimeStep() {
  // Lengden på ett enkelt-bilde basert på fps kameraet faktisk klarte
  return 1 / (actualFps || 30);
}

function updateScrubUI() {
  if (!playback.duration || !isFinite(playback.duration)) return;
  const pct = (playback.currentTime / playback.duration) * 1000;
  scrubBar.value = pct;
  curTimeEl.textContent = fmtTime(playback.currentTime);
  durTimeEl.textContent = fmtTime(playback.duration);
  frameNumEl.textContent = 'bilde ' + Math.round(playback.currentTime / frameTimeStep());
}

playback.addEventListener('timeupdate', updateScrubUI);
playback.addEventListener('loadedmetadata', updateScrubUI);

scrubBar.addEventListener('input', () => {
  if (!playback.duration) return;
  playback.pause();
  playPauseBtn.textContent = '▶️';
  const t = (scrubBar.value / 1000) * playback.duration;
  playback.currentTime = t;
});

function stepFrame(direction) {
  playback.pause();
  playPauseBtn.textContent = '▶️';
  const step = frameTimeStep() * direction;
  let newTime = playback.currentTime + step;
  newTime = Math.max(0, Math.min(playback.duration || newTime, newTime));
  playback.currentTime = newTime;
}

prevFrameBtn.addEventListener('click', () => stepFrame(-1));
nextFrameBtn.addEventListener('click', () => stepFrame(1));

playPauseBtn.addEventListener('click', () => {
  if (playback.paused) {
    playback.play();
    playPauseBtn.textContent = '⏸';
  } else {
    playback.pause();
    playPauseBtn.textContent = '▶️';
  }
});

function showPlayback() {
  if (!recordedUrl) return;
  viewingPlayback = true;
  liveView.style.display = 'none';
  playback.loop = false;
  playback.src = recordedUrl;
  playback.style.display = 'block';
  playbackLabel.style.display = 'block';
  speedControls.classList.add('show');
  scrubWrap.classList.add('show');
  playback.playbackRate = parseFloat(
    document.querySelector('.speedBtn.active')?.dataset.speed || '0.25'
  );
  playback.currentTime = 0;
  playback.play();
  playPauseBtn.textContent = '⏸';
  shutterBtn.style.visibility = 'hidden';
  statusText.textContent = 'Ser på opptak';
}

function hidePlayback() {
  viewingPlayback = false;
  playback.pause();
  playback.style.display = 'none';
  playbackLabel.style.display = 'none';
  speedControls.classList.remove('show');
  scrubWrap.classList.remove('show');
  liveView.style.display = 'block';
  shutterBtn.style.visibility = 'visible';
  statusText.textContent = 'Klar til opptak';
}

viewBtn.addEventListener('click', () => {
  if (!recordedUrl) return;
  if (!viewingPlayback) {
    showPlayback();
  } else {
    hidePlayback();
  }
});

newBtn.addEventListener('click', () => {
  // Slett forrige video
  if (recordedUrl) {
    URL.revokeObjectURL(recordedUrl);
    recordedUrl = null;
  }
  recordedBlob = null;
  chunks = [];
  viewBtn.disabled = true;
  newBtn.disabled = true;
  if (viewingPlayback) hidePlayback();
  statusText.textContent = 'Klar til nytt opptak';
});

speedControls.addEventListener('click', (e) => {
  const btn = e.target.closest('.speedBtn');
  if (!btn) return;
  document.querySelectorAll('.speedBtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  playback.playbackRate = parseFloat(btn.dataset.speed);
});
</script>
</body>
</html>
